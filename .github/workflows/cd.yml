name: Deployment

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

jobs:
  # Docker (build push docker image)
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build image
        run: |
          docker build \
          -f Dockerfile.prod \
          -t ${{secrets.DOCKERHUB_USERNAME}}/nestjs-app:latest \
          -t ${{secrets.DOCKERHUB_USERNAME}}/nestjs-app:${{github.sha}} .

      - name: Push Image to Docker Hub
        run: |
          docker push ${{secrets.DOCKERHUB_USERNAME}}/nestjs-app:latest
          docker push ${{secrets.DOCKERHUB_USERNAME}}/nestjs-app:${{github.sha}}

  # Config files
  prepare-configs:
    name: Copy Configs & Create .env
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files
        uses: appleboy/scp-action@master
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          source: 'docker-compose.yml,nginx/*'
          target: 'home/ubuntu/app'
          stripe_components: 0

      - name: Create env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          script: |
            echo "MONGO_URI=${{secrets.MONGO_URI}}" > /home/ubuntu/app/.env
            echo "PORT=${{secrets.PORT}}" >> /home/ubuntu/app/.env

  # Deploy (enter EC2 >> run containers)
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: prepare-configs
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          script: |
            cd '/home/ubuntu/app'
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -af
