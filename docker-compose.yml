# app >> container
services:
  app:
    restart: always
    image: ayaothman/nestjs-app:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: app
    expose:
      - '3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - webnet

  # nginx >> container
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - webnet

networks:
  webnet:
